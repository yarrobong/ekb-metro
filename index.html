<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />

    <meta

    <meta

    <link rel="canonical" href="https://yarrobong.github.io/ekb-metro/" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Метро Екатеринбурга" />
    <meta
      property="og:description"
      content="Время до следующего поезда и расчёт поездки в Екатеринбургском метрополитене."
    />
    <meta property="og:url" content="https://yarrobong.github.io/ekb-metro/" />
    <meta
      property="og:image"
      content="https://yarrobong.github.io/ekb-metro/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Метро Екатеринбурга. Следующий поезд и время поездки."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Метро Екатеринбурга" />
    <meta
      name="twitter:description"
      content="Время до следующего поезда и расчёт поездки в Екатеринбургском метрополитене."
    />
    <meta
      name="twitter:image"
      content="https://yarrobong.github.io/ekb-metro/og-image.png"
    />

    <meta name="theme-color" content="#0B0E12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Метро ЕКБ" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="color-scheme" content="dark" />

    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%BASE_URL%favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%apple-touch-icon.png" />

    <style>
      :root {
        color-scheme: dark;
        background: #0b0e12;
        color: #e2e8f0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial,
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: #0b0e12;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: radial-gradient(circle at top right, #131922, #0b0e12 48%, #0b0e12);
      }

      #root {
        min-height: 100vh;
      }

      .launch-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      }

      .launch-screen__panel {
        width: min(100%, 520px);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      .launch-screen__mark {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .launch-screen__mark-ring {
        position: absolute;
        inset: 0;
        border: 1px solid rgba(16, 185, 129, 0.22);
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(16, 185, 129, 0.18), rgba(16, 185, 129, 0.04)),
          rgba(11, 14, 18, 0.9);
        box-shadow:
          0 18px 40px rgba(0, 0, 0, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      .launch-screen__mark-pill {
        position: absolute;
        top: 22px;
        width: 12px;
        height: 34px;
        border-radius: 999px;
        background: linear-gradient(180deg, #6ee7b7, #10b981);
        box-shadow: 0 0 18px rgba(16, 185, 129, 0.22);
      }

      .launch-screen__mark-pill--left {
        transform: translateX(-10px) rotate(24deg);
      }

      .launch-screen__mark-pill--right {
        transform: translateX(10px) rotate(-24deg);
      }

      .launch-screen__eyebrow {
        margin: 18px 0 0;
        font-size: 12px;
        line-height: 18px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #94a3b8;
      }

      .launch-screen__title {
        margin: 12px 0 0;
        font-size: clamp(32px, 6vw, 42px);
        line-height: 1.05;
        font-weight: 700;
        letter-spacing: -0.04em;
      }

      .launch-screen__signal {
        width: 72px;
        height: 6px;
        margin-top: 24px;
        padding: 1px;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.18);
        overflow: hidden;
      }

      .launch-screen__signal-dot {
        width: 22px;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          rgba(110, 231, 183, 0.4),
          #10b981 62%,
          #6ee7b7
        );
        transform: translateX(0);
      }

      .launch-screen__signal-dot--animated {
        animation: launch-slide 1.25s ease-in-out infinite;
      }

      .launch-screen__status {
        min-height: 20px;
        margin: 14px 0 0;
        font-size: 14px;
        line-height: 20px;
        color: #94a3b8;
        opacity: 0;
        transition: opacity 140ms ease;
      }

      .launch-screen__status[data-visible="true"] {
        opacity: 1;
      }

      @keyframes launch-slide {
        0%,
        100% {
          transform: translateX(0);
        }

        50% {
          transform: translateX(48px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .launch-screen__signal-dot--animated {
          animation: none;
        }

        .launch-screen__status {
          transition: none;
        }
      }
    </style>

    <title>Метро Екатеринбурга</title>
  </head>

  <body>
    <noscript> Для работы приложения необходимо включить JavaScript. </noscript>

    <div id="root">
      <div class="launch-screen" data-reduced-motion="false">
        <div class="launch-screen__panel">
          <div class="launch-screen__mark" aria-hidden="true">
            <span class="launch-screen__mark-ring"></span>
            <span class="launch-screen__mark-pill launch-screen__mark-pill--left"></span>
            <span class="launch-screen__mark-pill launch-screen__mark-pill--right"></span>
          </div>

          <p class="launch-screen__eyebrow">Екатеринбургский метрополитен</p>
          <h1 class="launch-screen__title">Метро Екатеринбурга</h1>

          <div class="launch-screen__signal" aria-hidden="true">
            <span
              class="launch-screen__signal-dot launch-screen__signal-dot--animated"
            ></span>
          </div>

          <p
            class="launch-screen__status"
            role="status"
            aria-live="polite"
            data-launch-status
            data-visible="false"
          >
            Загружаем расписание
          </p>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const root = document.getElementById("root");
        const status = root?.querySelector("[data-launch-status]");
        const mediaQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
        const launchScreen = root?.querySelector(".launch-screen");

        if (launchScreen) {
          launchScreen.setAttribute("data-reduced-motion", String(mediaQuery.matches));
        }

        const statusTimer = window.setTimeout(() => {
          status?.setAttribute("data-visible", "true");
        }, 160);

        window.addEventListener(
          "load",
          () => {
            window.clearTimeout(statusTimer);
          },
          { once: true },
        );
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
